version: "3.8"

services:
  # ─── LocalStack (S3 + SQS + Lambda) ───
  # Scripts in ./scripts/ auto-execute via /etc/localstack/init/ready.d
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=s3,sqs,lambda
      - DEBUG=1
      - LAMBDA_EXECUTOR=docker
      - LAMBDA_DOCKER_NETWORK=ocr-network
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=300
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts:/etc/localstack/init/ready.d"
      - "./lambda/dist:/opt/lambda-dist:ro"
      - "localstack-data:/var/lib/localstack"
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ─── Build Lambda binary (Go + creates deployment zip) ───
  lambda-builder:
    build:
      context: ./lambda
      dockerfile: Dockerfile.build
    container_name: lambda-builder
    volumes:
      - "./lambda/dist:/out"
    networks:
      - ocr-network

  # ─── Web Upload UI ───
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ocr-web
    ports:
      - "8080:80"
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - ocr-network

  # ─── Playwright E2E Tests ───
  tests:
    build:
      context: ./tests
      dockerfile: Dockerfile
    container_name: ocr-tests
    depends_on:
      localstack:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      - WEB_URL=http://ocr-web:80
      - LOCALSTACK_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - "./test-results:/app/test-results"
      - "./test-images:/app/test-images"
    networks:
      - ocr-network
    profiles:
      - test

volumes:
  localstack-data:

networks:
  ocr-network:
    name: ocr-network
    driver: bridge
