<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Image Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0a0e17;--surface:#111827;--border:#1e293b;--text:#e2e8f0;--dim:#64748b;--accent:#3b82f6;--glow:rgba(59,130,246,.12);--ok:#10b981;--err:#ef4444;--r:12px}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
        .wrap{width:100%;max-width:640px}
        h1{font-size:1.6rem;text-align:center;margin-bottom:.4rem;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sub{text-align:center;color:var(--dim);font-size:.88rem;margin-bottom:2rem}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem}
        .drop{border:2px dashed var(--border);border-radius:var(--r);padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:.2s;position:relative}
        .drop:hover,.drop.over{border-color:var(--accent);background:var(--glow)}
        .drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
        .drop h3{font-size:.95rem;font-weight:500;margin-top:.8rem}
        .drop .hint{font-size:.78rem;color:var(--dim);margin-top:.25rem}
        .icon{width:40px;height:40px;margin:0 auto;opacity:.4}
        .preview{display:none;align-items:center;gap:1rem;padding:.85rem;background:var(--bg);border-radius:8px;margin-top:1.1rem}
        .preview.on{display:flex}
        .preview img{width:52px;height:52px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
        .preview .info{flex:1;min-width:0}
        .preview .name{font-family:'JetBrains Mono',monospace;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .preview .size{font-size:.72rem;color:var(--dim);margin-top:2px}
        .preview .rm{background:0;border:0;color:var(--dim);cursor:pointer;font-size:1.1rem;padding:4px}.preview .rm:hover{color:var(--err)}
        .btn{display:block;width:100%;padding:.8rem;margin-top:1.3rem;font-family:'DM Sans';font-size:.9rem;font-weight:600;color:#fff;background:var(--accent);border:0;border-radius:8px;cursor:pointer;transition:.2s}
        .btn:hover:not(:disabled){background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.25)}
        .btn:disabled{opacity:.35;cursor:not-allowed}
        .bar{display:none;height:4px;background:var(--bg);border-radius:4px;margin-top:1rem;overflow:hidden}.bar.on{display:block}
        .bar .fill{height:100%;background:var(--accent);width:0%;transition:width .3s}
        .status{margin-top:1rem;padding:.85rem;border-radius:8px;font-size:.82rem;display:none;font-family:'JetBrains Mono',monospace;line-height:1.5}
        .status.on{display:block}
        .status.ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);color:var(--ok)}
        .status.err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);color:var(--err)}
        .status.proc{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);color:var(--accent)}
        .result{display:none;margin-top:1.5rem}.result.on{display:block}
        .result h3{font-size:.78rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
        .result pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1.1rem;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.7;white-space:pre-wrap;max-height:350px;overflow-y:auto;color:var(--text)}
        .result pre::-webkit-scrollbar{width:6px}.result pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        .sqs-section{margin-top:1.25rem;display:none}.sqs-section.on{display:block}
        .sqs-section h3{font-size:.78rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
        .sqs-msg{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.85rem;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.6;color:#a5b4fc;margin-bottom:.5rem;word-break:break-all}
    </style>
</head>
<body>
<div class="wrap">
    <h1>⬡ OCR Extract</h1>
    <p class="sub">Upload an image to extract text via Tesseract OCR</p>
    <div class="card">
        <div class="drop" id="drop">
            <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg></div>
            <h3>Drop image here or click to browse</h3>
            <p class="hint">PNG, JPG, TIFF, BMP — max 10 MB</p>
            <input type="file" id="fileIn" accept="image/png,image/jpeg,image/tiff,image/bmp,image/gif,image/webp">
        </div>
        <div class="preview" id="preview">
            <img id="thumb" src="" alt="">
            <div class="info"><div class="name" id="fname"></div><div class="size" id="fsize"></div></div>
            <button class="rm" id="rm">✕</button>
        </div>
        <button class="btn" id="btn" disabled>Upload & Extract Text</button>
        <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
        <div class="status" id="status"></div>
        <div class="result" id="result"><h3>Extracted Text</h3><pre id="ocrText"></pre></div>
        <div class="sqs-section" id="sqsSec"><h3>SQS Message</h3><div id="sqsMsg" class="sqs-msg"></div></div>
    </div>
</div>
<script>
// ── Config ──
// Browser accesses LocalStack via localhost:4566
const LS = 'http://localhost:4566';
const UP_BUCKET = 'ocr-uploads';
const OUT_BUCKET = 'ocr-output';
const SQS_QUEUE = 'ocr-results';

const $ = id => document.getElementById(id);
let file = null;

// ── Drop zone ──
const drop = $('drop');
['dragenter','dragover'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', ev => { if (ev.dataTransfer.files[0]) pick(ev.dataTransfer.files[0]); });
$('fileIn').addEventListener('change', function(){ if(this.files[0]) pick(this.files[0]); });
$('rm').addEventListener('click', clear);

function pick(f) {
    const ok = ['image/png','image/jpeg','image/tiff','image/bmp','image/gif','image/webp'];
    if (!ok.includes(f.type)) { stat('Unsupported file type.','err'); return; }
    if (f.size > 10*1024*1024) { stat('File too large (max 10 MB).','err'); return; }
    file = f;
    $('fname').textContent = f.name;
    $('fsize').textContent = fmt(f.size);
    const r = new FileReader(); r.onload = e => $('thumb').src = e.target.result; r.readAsDataURL(f);
    $('preview').classList.add('on');
    $('btn').disabled = false;
    hide('status'); hide('result'); hide('sqsSec');
}

function clear() {
    file = null; $('fileIn').value = '';
    $('preview').classList.remove('on');
    $('btn').disabled = true;
}

// ── Upload ──
$('btn').addEventListener('click', () => { if (file) run(file); });

async function run(f) {
    $('btn').disabled = true;
    show('bar'); $('fill').style.width = '0%';
    hide('result'); hide('sqsSec');
    stat('Uploading image to S3…','proc');

    try {
        const key = f.name;

        // 1) Upload to S3
        await new Promise((res, rej) => {
            const xhr = new XMLHttpRequest();
            xhr.open('PUT', `${LS}/${UP_BUCKET}/${encodeURIComponent(key)}`);
            xhr.setRequestHeader('Content-Type', f.type);
            xhr.upload.onprogress = e => { if (e.lengthComputable) $('fill').style.width = Math.round(e.loaded/e.total*100)+'%'; };
            xhr.onload = () => xhr.status < 300 ? res() : rej(new Error('Upload HTTP ' + xhr.status));
            xhr.onerror = () => rej(new Error('Network error'));
            xhr.send(f);
        });

        $('fill').style.width = '100%';
        stat('Upload done. Waiting for OCR…','proc');

        // 2) Poll S3 for the .txt result
        const outKey = key.replace(/\.[^.]+$/, '.txt');
        const outUrl = `${LS}/${OUT_BUCKET}/${encodeURIComponent(outKey)}`;
        let text = null;
        for (let i = 0; i < 45; i++) {
            await sleep(2000);
            stat(`Waiting for OCR result… (${i+1}/45)`,'proc');
            try {
                const r = await fetch(outUrl);
                if (r.ok) { text = await r.text(); break; }
            } catch(e) { /* retry */ }
        }

        if (text && text.trim()) {
            stat('✓ OCR complete — text extracted!','ok');
            $('ocrText').textContent = text;
            show('result');

            // 3) Poll SQS for the notification message
            await pollSQS();
        } else {
            stat('OCR complete — no text detected in image.','err');
        }
    } catch(e) {
        stat('Error: ' + e.message, 'err');
    } finally {
        $('btn').disabled = false;
        setTimeout(() => hide('bar'), 800);
    }
}

// ── SQS Polling ──
async function pollSQS() {
    try {
        // Get queue URL
        const qurlResp = await fetch(`${LS}/?Action=GetQueueUrl&QueueName=${SQS_QUEUE}&Version=2012-11-05`);
        const qurlXml = await qurlResp.text();
        const qurlMatch = qurlXml.match(/<QueueUrl>([^<]+)<\/QueueUrl>/);
        if (!qurlMatch) return;
        const queueUrl = qurlMatch[1];

        // Receive messages
        const rcvResp = await fetch(`${LS}/?Action=ReceiveMessage&QueueUrl=${encodeURIComponent(queueUrl)}&MaxNumberOfMessages=10&WaitTimeSeconds=2&Version=2012-11-05`);
        const rcvXml = await rcvResp.text();

        const msgs = [];
        const re = /<Body>([^<]+)<\/Body>/g;
        let m;
        while ((m = re.exec(rcvXml)) !== null) {
            // Decode XML entities
            let body = m[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
            msgs.push(body);
        }

        if (msgs.length > 0) {
            // Pretty-print the JSON
            let html = '';
            for (const raw of msgs) {
                try {
                    const obj = JSON.parse(raw);
                    html += JSON.stringify(obj, null, 2) + '\n';
                } catch(e) {
                    html += raw + '\n';
                }
            }
            $('sqsMsg').textContent = html.trim();
            show('sqsSec');
        }
    } catch(e) {
        console.error('SQS poll error:', e);
    }
}

// ── Helpers ──
function stat(msg, cls) { const s=$('status'); s.textContent=msg; s.className='status on '+cls; }
function show(id) { $(id).classList.add('on'); }
function hide(id) { $(id).classList.remove('on'); }
function fmt(b) { if(!b) return '0 B'; const k=1024,s=['B','KB','MB'],i=Math.floor(Math.log(b)/Math.log(k)); return (b/Math.pow(k,i)).toFixed(1)+' '+s[i]; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
