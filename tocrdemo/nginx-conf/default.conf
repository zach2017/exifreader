server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;

    # ── Serve static files ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: S3 operations → LocalStack ───────────────────
    # Usage: PUT /api/s3/file-uploads/uploads/photo.png
    location /api/s3/ {
        rewrite ^/api/s3/(.*)$ /$1 break;
        proxy_pass http://localstack:4566;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;

        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, PUT, POST, DELETE, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "ETag" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Proxy: Lambda invocations → LocalStack ──────────────
    # Usage: POST /api/lambda/file-processor/invocations
    location /api/lambda/ {
        rewrite ^/api/lambda/(.*)$ /2015-03-31/functions/$1 break;
        proxy_pass http://localstack:4566;
        proxy_set_header Host localhost;
        proxy_set_header Content-Type application/json;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Proxy: LocalStack health check ──────────────────────
    location /api/health {
        proxy_pass http://localstack:4566/_localstack/health;
        proxy_set_header Host localhost;
    }
}
