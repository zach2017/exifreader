server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;

    # ── Serve static files ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: S3 operations → LocalStack ───────────────────
    location /api/s3/ {

        # Handle OPTIONS preflight BEFORE proxying
        # CRITICAL: headers MUST be inside this block — nginx if is its own context
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Amz-Date, X-Amz-Security-Token, X-Amz-Content-Sha256, x-amz-acl' always;
            add_header 'Access-Control-Expose-Headers' 'ETag, x-amz-request-id' always;
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        rewrite ^/api/s3/(.*)$ /$1 break;

        proxy_pass http://localstack:4566;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        # Hide any CORS headers from LocalStack to avoid duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # Set our own CORS headers on actual responses
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Amz-Date, X-Amz-Security-Token, X-Amz-Content-Sha256, x-amz-acl' always;
        add_header 'Access-Control-Expose-Headers' 'ETag, x-amz-request-id' always;
    }

    # ── Proxy: Lambda invocations → LocalStack ──────────────
    location /api/lambda/ {

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        rewrite ^/api/lambda/(.*)$ /2015-03-31/functions/$1 break;

        proxy_pass http://localstack:4566;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header Content-Type application/json;
        proxy_set_header Connection '';

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }

    # ── Proxy: LocalStack health check ──────────────────────
    location /api/health {
        proxy_pass http://localstack:4566/_localstack/health;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;

        add_header 'Access-Control-Allow-Origin' '*' always;
    }
}
