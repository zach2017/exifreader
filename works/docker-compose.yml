# ══════════════════════════════════════════════
#  OCR Document Processor – Docker Compose
# ══════════════════════════════════════════════
#
#  IMPORTANT: The network name "ocr-net" is set explicitly via
#  `name: ocr-net` so that LAMBDA_DOCKER_NETWORK works regardless
#  of what the project directory is named.
# ══════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:17
    container_name: ocr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ocr-net

  # ── OCR API Server (FastAPI + Tesseract) ────
  # Starts BEFORE LocalStack so Lambda can reach it
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: ocr-api-server
    restart: unless-stopped
    environment:
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ocr-net

  # ── LocalStack (S3 + Lambda) ────────────────
  # Starts AFTER api-server so the Lambda→API call works during init.
  #
  # Lambda execution modes (pick ONE):
  #   1. LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=60  (docker, default)
  #      Spawns a real Docker container per Lambda invocation.
  #      Requires Docker socket mount + LAMBDA_DOCKER_NETWORK.
  #   2. PROVIDER_OVERRIDE_LAMBDA=asf  (not used here)
  #
  # The key insight: LocalStack spawns Lambda containers on the
  # Docker HOST, NOT inside the LocalStack container. Those spawned
  # containers need to be attached to the same Docker network so
  # they can resolve "api-server" by hostname.
  localstack:
    image: localstack/localstack:latest
    container_name: ocr-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3,lambda
      DEBUG: ${LOCALSTACK_DEBUG:-0}

      # ── Lambda Docker Execution Settings ──
      # Network for spawned Lambda containers — must match the
      # `name:` field on the network below (NOT the compose-generated name).
      LAMBDA_DOCKER_NETWORK: ocr-net
      # Extra flags passed to `docker run` for Lambda containers.
      # --dns: use Docker's embedded DNS so container names resolve.
      LAMBDA_DOCKER_FLAGS: "--dns 127.0.0.11"
      # Timeout for the Lambda runtime environment to start (seconds).
      LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT: 60

      AWS_DEFAULT_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      # Passed to init script
      S3_BUCKET: ${S3_BUCKET}
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init:ro
      - ./lambda:/opt/lambda:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      api-server:
        condition: service_healthy
    networks:
      - ocr-net

  # ── Frontend (Nginx + HTML) ─────────────────
  frontend:
    image: nginx:1.27-alpine
    container_name: ocr-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-server
    networks:
      - ocr-net

volumes:
  pgdata:
  localstack_data:

networks:
  ocr-net:
    # Explicit name prevents Docker Compose from prefixing with
    # the project directory name (e.g. "ocr-solution_ocr-net").
    # This is critical because LAMBDA_DOCKER_NETWORK must match exactly.
    name: ocr-net
    driver: bridge
