server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ALL LocalStack requests (S3, SQS, Lambda, DynamoDB)
    location /aws/ {
        rewrite ^/aws/(.*) /$1 break;
        proxy_pass http://localstack:4566;
        proxy_set_header Host localstack;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Amz-Target, X-Amz-Date, X-Amz-Content-Sha256" always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # Proxy Elasticsearch requests
    location /es/ {
        rewrite ^/es/(.*) /$1 break;
        proxy_pass http://elasticsearch:9200;
        proxy_set_header Host elasticsearch;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = 'OPTIONS') { return 204; }
    }
}
