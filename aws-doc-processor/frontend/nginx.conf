server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to LocalStack API Gateway
    location /api/ {
        proxy_pass http://localstack:4566/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # Proxy S3 requests to LocalStack
    location /s3/ {
        proxy_pass http://localstack:4566/docproc-bucket/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, PUT, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # Proxy Elasticsearch requests
    location /es/ {
        proxy_pass http://elasticsearch:9200/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # Proxy DynamoDB scan via LocalStack
    location /dynamo/ {
        proxy_pass http://localstack:4566/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
    }
}
