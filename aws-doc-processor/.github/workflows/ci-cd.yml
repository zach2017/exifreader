###############################################################################
# GitHub Actions — CI/CD Pipeline for Document Processing System
#
# Workflow:
#   1. Lint & unit test all Lambda functions
#   2. Spin up LocalStack + Elasticsearch via Docker Compose
#   3. Initialize AWS resources (S3, SQS, DynamoDB, Lambda, Step Functions)
#   4. Run integration tests against LocalStack
#   5. Package Lambda functions as deployment artifacts
#   6. (On main branch) Deploy to AWS via CloudFormation/SAM
###############################################################################

name: DocProc CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_DEFAULT_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  LOCALSTACK_ENDPOINT: http://localhost:4566

jobs:
  # ─── Job 1: Lint & Unit Tests ─────────────────────────
  lint-and-test:
    name: 🧪 Lint & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov moto[all] boto3
          # Install each Lambda's dependencies
          for dir in lambdas/*/; do
            if [ -f "$dir/requirements.txt" ]; then
              pip install -r "$dir/requirements.txt"
            fi
          done

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 lambdas/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings as non-blocking
          flake8 lambdas/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=lambdas --cov-report=xml --cov-report=term-missing
        env:
          AWS_ENDPOINT_URL: ""
          S3_BUCKET: test-bucket
          DYNAMODB_TABLE: test-metadata
          ELASTICSEARCH_URL: http://localhost:9200

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─── Job 2: Integration Tests with LocalStack ────────
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        env:
          SERVICES: s3,sqs,lambda,stepfunctions,dynamodb,iam
          DEBUG: 0
          LAMBDA_EXECUTOR: local
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install AWS CLI
        run: |
          pip install awscli-local awscli boto3 pytest requests

      - name: Wait for LocalStack
        run: |
          echo "Waiting for LocalStack to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:4566/_localstack/health | grep -q '"s3": "available"'; then
              echo "LocalStack is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: Create AWS Resources
        run: |
          export ENDPOINT=http://localhost:4566
          
          # S3
          aws --endpoint-url=$ENDPOINT s3 mb s3://docproc-bucket
          
          # SQS
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name file-router-queue
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name text-extract-queue
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name ocr-queue
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name file-router-dlq
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name text-extract-dlq
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name ocr-dlq
          
          # DynamoDB
          aws --endpoint-url=$ENDPOINT dynamodb create-table \
            --table-name document-metadata \
            --attribute-definitions AttributeName=file_id,AttributeType=S \
            --key-schema AttributeName=file_id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST
          
          echo "✅ AWS resources created"

      - name: Deploy Lambda Functions
        run: |
          export ENDPOINT=http://localhost:4566
          ROLE_ARN="arn:aws:iam::000000000000:role/lambda-exec-role"
          
          # Create IAM role
          aws --endpoint-url=$ENDPOINT iam create-role \
            --role-name lambda-exec-role \
            --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
          
          # Package and deploy each Lambda
          for func in file-router text-extractor ocr-extractor; do
            cd lambdas/$func
            zip -j /tmp/$func.zip handler.py
            aws --endpoint-url=$ENDPOINT lambda create-function \
              --function-name $func \
              --runtime python3.11 \
              --handler handler.lambda_handler \
              --role $ROLE_ARN \
              --zip-file fileb:///tmp/$func.zip \
              --timeout 60 \
              --memory-size 512 \
              --environment "Variables={S3_BUCKET=docproc-bucket,DYNAMODB_TABLE=document-metadata,AWS_ENDPOINT_URL=http://localhost:4566,TEXT_EXTRACT_QUEUE_URL=http://localhost:4566/000000000000/text-extract-queue,OCR_QUEUE_URL=http://localhost:4566/000000000000/ocr-queue}"
            cd ../..
            echo "  ✅ Lambda '$func' deployed"
          done

      - name: Run Integration Tests
        run: |
          python -m pytest tests/test_integration.py -v --timeout=60
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          S3_BUCKET: docproc-bucket
          DYNAMODB_TABLE: document-metadata

      - name: Verify S3 Operations
        run: |
          export ENDPOINT=http://localhost:4566
          
          # Upload a test file
          echo "Hello, this is a test document." > /tmp/test.txt
          aws --endpoint-url=$ENDPOINT s3 cp /tmp/test.txt s3://docproc-bucket/uploads/test-001/test.txt
          
          # Verify it exists
          aws --endpoint-url=$ENDPOINT s3 ls s3://docproc-bucket/uploads/test-001/
          
          # Invoke file-router Lambda
          aws --endpoint-url=$ENDPOINT lambda invoke \
            --function-name file-router \
            --payload '{"Records":[{"body":"{\"Records\":[{\"s3\":{\"bucket\":{\"name\":\"docproc-bucket\"},\"object\":{\"key\":\"uploads/test-001/test.txt\",\"size\":32}}}]}"}]}' \
            /tmp/response.json
          
          cat /tmp/response.json
          echo ""
          echo "✅ Integration test passed"

  # ─── Job 3: Build & Package ──────────────────────────
  build:
    name: 📦 Build Lambda Packages
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package Lambda Functions
        run: |
          mkdir -p dist
          
          for func in file-router text-extractor ocr-extractor; do
            echo "📦 Packaging $func..."
            cd lambdas/$func
            
            mkdir -p /tmp/package-$func
            if [ -f requirements.txt ]; then
              pip install -r requirements.txt -t /tmp/package-$func/ --quiet
            fi
            cp handler.py /tmp/package-$func/
            
            cd /tmp/package-$func
            zip -r9 $GITHUB_WORKSPACE/dist/$func.zip . --quiet
            cd $GITHUB_WORKSPACE
            
            echo "  ✅ dist/$func.zip ($(du -h dist/$func.zip | cut -f1))"
          done
          
          ls -lh dist/

      - name: Upload Lambda Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: dist/*.zip
          retention-days: 30

  # ─── Job 4: Deploy (main branch only) ───────────────
  deploy:
    name: 🚀 Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download Lambda Artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: dist/

      - name: Deploy CloudFormation Stack
        run: |
          echo "─────────────────────────────────────────────"
          echo "  Production deployment would run here."
          echo "  Using: aws cloudformation deploy"
          echo "  Or:    aws sam deploy"
          echo "  Or:    terraform apply"
          echo "─────────────────────────────────────────────"
          echo ""
          echo "  Artifacts ready:"
          ls -lh dist/
          echo ""
          echo "  To deploy manually:"
          echo "  aws lambda update-function-code --function-name file-router --zip-file fileb://dist/file-router.zip"
          echo "  aws lambda update-function-code --function-name text-extractor --zip-file fileb://dist/text-extractor.zip"
          echo "  aws lambda update-function-code --function-name ocr-extractor --zip-file fileb://dist/ocr-extractor.zip"

      - name: Post-Deploy Smoke Test
        run: |
          echo "Running post-deploy smoke tests..."
          # In production, you'd invoke the Lambda and verify responses
          echo "✅ Deployment complete"
