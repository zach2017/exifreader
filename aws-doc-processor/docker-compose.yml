###############################################################################
# AWS Document Processing Pipeline — Docker Compose
# Services: LocalStack (AWS emulator), Elasticsearch, Frontend (nginx)
###############################################################################

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────
  # LocalStack — Emulates AWS services locally
  # S3, SQS, Lambda, Step Functions, DynamoDB, API Gateway
  # ─────────────────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.0
    container_name: docproc-localstack
    ports:
      - "4566:4566"          # Main edge port (all services)
      - "4510-4559:4510-4559" # External service ports
    environment:
      - SERVICES=s3,sqs,lambda,stepfunctions,dynamodb,apigateway,iam,logs
      - DEBUG=1
      - LAMBDA_EXECUTOR=docker-reuse
      - LAMBDA_DOCKER_NETWORK=docproc-network
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PERSISTENCE=1
      - LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=120
    volumes:
      - "./infrastructure/localstack:/etc/localstack/init/ready.d"
      - "./lambdas:/opt/lambdas"
      - "${TMPDIR:-/tmp}/localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - docproc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Elasticsearch — Full-text search for extracted documents
  # ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: docproc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=docproc-cluster
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - docproc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Frontend — nginx serving the HTML upload/search interface
  # ─────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: docproc-frontend
    ports:
      - "8080:80"
    volumes:
      - "./frontend:/usr/share/nginx/html:ro"
      - "./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on:
      localstack:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - docproc-network

  # ─────────────────────────────────────────────────────────────
  # Init — One-shot container to set up Elasticsearch index
  # ─────────────────────────────────────────────────────────────
  es-init:
    image: curlimages/curl:latest
    container_name: docproc-es-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - docproc-network
    entrypoint: >
      sh -c '
        echo "Creating Elasticsearch index...";
        curl -X PUT "http://elasticsearch:9200/documents" -H "Content-Type: application/json" -d "{
          \"settings\": {
            \"number_of_shards\": 1,
            \"number_of_replicas\": 0,
            \"analysis\": {
              \"analyzer\": {
                \"content_analyzer\": {
                  \"type\": \"standard\",
                  \"stopwords\": \"_english_\"
                }
              }
            }
          },
          \"mappings\": {
            \"properties\": {
              \"file_id\":        { \"type\": \"keyword\" },
              \"filename\":       { \"type\": \"text\", \"fields\": { \"keyword\": { \"type\": \"keyword\" } } },
              \"content\":        { \"type\": \"text\", \"analyzer\": \"content_analyzer\" },
              \"file_type\":      { \"type\": \"keyword\" },
              \"upload_time\":    { \"type\": \"date\" },
              \"s3_key\":         { \"type\": \"keyword\" },
              \"extracted_from\": { \"type\": \"keyword\" },
              \"source_type\":    { \"type\": \"keyword\" }
            }
          }
        }" 2>/dev/null || true;
        echo "";
        echo "Elasticsearch index created successfully!";
      '

volumes:
  es-data:
    driver: local

networks:
  docproc-network:
    name: docproc-network
    driver: bridge
